name: moneydiary_thai
description: "บัญชีวิถีไทย — สมุดบันทึกเงินวิถีไทย บันทึกรายรับ-รายจ่าย ออฟไลน์ ส่วนตัว ปลอดภัย"
# ป้องกันการ publish โดยไม่ตั้งใจ
publish_to: 'none'
version: 1.1.1+5

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # i18n: Flutter localization (รองรับไทย + อังกฤษ)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1

  # State Management: Riverpod 2.x type-safe + reactive
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing: Declarative, deep-link ready
  go_router: ^14.6.1

  # Local Database: Drift (type-safe SQL) + SQLite + Encryption
  drift: ^2.21.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.26
  # SQLCipher สำหรับ encrypt ฐานข้อมูล (เพิ่มใน Batch 2)
  # sqlcipher_flutter_libs: ^0.6.5
  path_provider: ^2.1.5
  path: ^1.9.0

  # Biometric authentication (Face ID / Touch ID / Fingerprint)
  local_auth: ^2.3.0

  # SharedPreferences สำหรับ settings ที่ไม่ sensitive
  shared_preferences: ^2.3.4

  # Environment variables (โหลดจาก .env ไฟล์)
  flutter_dotenv: ^5.2.1

  # Charts: รายงาน pie/bar/line
  fl_chart: ^0.69.2

  # App version (Settings + About)
  package_info_plus: ^8.3.0

  # Open Privacy Policy / Terms URLs
  url_launcher: ^6.3.1

  # Home Screen Widget สำหรับ iOS + Android
  # home_widget: ^0.7.0  # เพิ่มใน v1.1 (Batch 6)

  # File handling สำหรับ CSV import/export
  file_picker: ^8.1.6
  csv: ^6.0.0
  share_plus: ^10.1.2

  # UUID สำหรับ generate primary keys
  uuid: ^4.5.1

  # Utility: equatable สำหรับ value comparison
  equatable: ^2.0.7

  # Currency input formatter
  flutter_masked_text2: ^0.9.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting + Code Quality
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App Icons generator
  flutter_launcher_icons: ^0.14.4

  # Splash screen generator
  flutter_native_splash: ^2.4.4

# Configure Flutter assets และ fonts
flutter:
  uses-material-design: true
  generate: true   # เปิดใช้ flutter_localizations gen

  assets:
    - assets/images/
    - assets/icons/
    - .env

  # ฟอนต์ Sarabun รองรับไทย+อังกฤษ
  # หมายเหตุ: ดาวน์โหลดจาก https://fonts.google.com/specimen/Sarabun
  # แล้วใส่ในโฟลเดอร์ assets/fonts/ (SETUP.md อธิบายไว้)
  fonts:
    - family: Sarabun
      fonts:
        - asset: assets/fonts/Sarabun-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sarabun-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sarabun-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sarabun-Bold.ttf
          weight: 700

# ═══════════════════════════════════════════════
# App Icon Configuration
# ═══════════════════════════════════════════════
# รัน: dart run flutter_launcher_icons
# จะ generate iOS app icons ทุก size อัตโนมัติจาก master 1024×1024
flutter_launcher_icons:
  image_path: "assets/app_icon/icon_1024.png"
  ios: true
  android: false   # MVP เน้น iOS ก่อน — เพิ่ม Android ภายหลัง
  remove_alpha_ios: true   # iOS ห้ามมี alpha channel ใน app icon
  # ไม่ใส่ background_color → iOS รอบมุมเอง

# ═══════════════════════════════════════════════
# Splash Screen Configuration
# ═══════════════════════════════════════════════
# รัน: dart run flutter_native_splash:create
# จะ generate splash screens ทุก device/orientation อัตโนมัติ
flutter_native_splash:
  # Background color (สีพื้น splash)
  color: "#0F766E"           # teal — สีหลักของแอป
  color_dark: "#065F58"      # teal เข้ม — สำหรับ dark mode

  # Icon ที่จะอยู่ตรงกลาง
  image: "assets/app_icon/splash_icon.png"
  image_dark: "assets/app_icon/splash_icon_dark.png"

  # iOS only (MVP)
  ios: true
  android: false

  # iOS 12+ splash (modern)
  ios_content_mode: center

